<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Halloween Archery - Premium Weapon Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0c10;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff5500;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 8px #000, 0 0 10px #ff5500;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>

<body>

    <div id="ui">SKOR: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        let score = 0;
        let width, height;

        // Arka plan resmi
        const bgImage = new Image();
        bgImage.src = "https://static.vecteezy.com/system/resources/thumbnails/029/731/971/small_2x/halloween-pumpkins-against-the-backdrop-of-a-scary-terrifying-house-and-forest-on-a-dark-night-halloween-background-photo.jpg";

        // Canavar Görselleri
        const monsterImages = [new Image(), new Image(), new Image()];
        monsterImages[0].src = "https://raw.githubusercontent.com/Softsprout/veloralpcase/refs/heads/main/monster1.png";
        monsterImages[1].src = "https://raw.githubusercontent.com/Softsprout/veloralpcase/refs/heads/main/monster2.png";
        monsterImages[2].src = "https://raw.githubusercontent.com/Softsprout/veloralpcase/refs/heads/main/monster3.png";

        // --- YENİ SİLAH VE OK GÖRSELLERİ ---
        // GitHub'a yüklediğin yay ve ok linklerini buraya yapıştır
        const launcherImage = new Image();
        launcherImage.src = "https://raw.githubusercontent.com/Softsprout/veloralpcase/refs/heads/main/launcher.png";

        const arrowImage = new Image();
        arrowImage.src = "https://raw.githubusercontent.com/Softsprout/veloralpcase/refs/heads/main/arrow.png";

        // Fırlatıcı Ayarları
        const launcher = {
            x: 0,
            y: 0,
            radius: 40,
            isDragging: false,
            dragX: 0,
            dragY: 0,
            maxDrag: 140,
            width: 120,  // Yayın ekrandaki genişliği
            height: 90   // Yayın ekrandaki yüksekliği
        };

        let arrows = [];
        let targets = [];

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;

            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';

            ctx.scale(dpr, dpr);

            launcher.x = width / 2;
            launcher.y = height - 70;
        }

        // Canavar Sınıfı
        class HalloweenMonster {
            constructor() {
                this.imgIndex = Math.floor(Math.random() * monsterImages.length);
                this.image = monsterImages[this.imgIndex];
                this.x = Math.random() > 0.5 ? -200 : width + 200;
                this.y = Math.random() * (height * 0.45) + 60;
                this.speed = (Math.random() * 1.8 + 1.5) * (this.x < 0 ? 1 : -1);
                this.height = 65;
                this.width = 110;
                this.radius = this.height * 0.45;
            }
            update() {
                this.x += this.speed;
                this.y += Math.sin(this.x * 0.02) * 0.6;
            }
            draw() {
                ctx.save();
                ctx.translate(Math.floor(this.x), Math.floor(this.y));
                if (this.speed > 0) ctx.scale(-1, 1);
                if (this.image.complete) {
                    const aspectRatio = this.image.naturalWidth / this.image.naturalHeight;
                    this.width = this.height * aspectRatio;
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(this.image, -this.width / 2, -this.height / 2, this.width, this.height);
                }
                ctx.restore();
            }
        }

        // GÖRSEL TABANLI YENİ OK SINIFI
        class CurseArrow {
            constructor(x, y, vx, vy) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.gravity = 0.16; this.angle = 0;

                // Ok boyutu (Heybetli ve net durması için)
                this.height = 38;
                this.width = 100;
            }
            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;

                // Gitmesi gereken ham hareket açısını hesaplıyoruz
                this.angle = Math.atan2(this.vy, this.vx);
            }
            draw() {
                ctx.save();
                ctx.translate(Math.floor(this.x), Math.floor(this.y));

                // --- OK YÖNÜ DÜZELTME AYARI ---
                // Eğer ok havada giderken ucu yerine arkası önde gidiyorsa, 
                // buradaki "+ Math.PI" ifadesini silebilir veya değiştirebilirsin.
                ctx.rotate(this.angle + Math.PI);

                if (arrowImage.complete) {
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';

                    const aspectRatio = arrowImage.naturalWidth / arrowImage.naturalHeight;
                    this.width = this.height * aspectRatio;

                    // Okun tam ucunun (plazma alevinin) canavara çarpması için merkezleme hizası
                    ctx.drawImage(arrowImage, -this.width / 2, -this.height / 2, this.width, this.height);
                } else {
                    ctx.strokeStyle = '#49e31b'; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.moveTo(-30, 0); ctx.lineTo(30, 0); ctx.stroke();
                }
                ctx.restore();
            }
        }

        // Girdi Kontrolleri
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }
        function startDrag(e) {
            const pos = getPos(e);
            const dist = Math.hypot(pos.x - launcher.x, pos.y - launcher.y);
            if (dist < launcher.radius + 60) {
                launcher.isDragging = true;
                launcher.dragX = pos.x;
                launcher.dragY = pos.y;
            }
        }
        function doDrag(e) {
            if (!launcher.isDragging) return;
            const pos = getPos(e);
            const dx = pos.x - launcher.x;
            const dy = pos.y - launcher.y;
            const dist = Math.hypot(dx, dy);
            if (dist > launcher.maxDrag) {
                launcher.dragX = launcher.x + (dx / dist) * launcher.maxDrag;
                launcher.dragY = launcher.y + (dy / dist) * launcher.maxDrag;
            } else {
                launcher.dragX = pos.x;
                launcher.dragY = pos.y;
            }
        }
        function endDrag(e) {
            if (!launcher.isDragging) return;
            launcher.isDragging = false;
            const dx = launcher.x - launcher.dragX;
            const dy = launcher.y - launcher.dragY;
            const power = 0.16;
            arrows.push(new CurseArrow(launcher.x, launcher.y - 15, dx * power, dy * power));
        }

        window.addEventListener('resize', resize);
        canvas.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', doDrag);
        window.addEventListener('mouseup', endDrag);
        canvas.addEventListener('touchstart', startDrag, { passive: true });
        canvas.addEventListener('touchmove', doDrag, { passive: true });
        window.addEventListener('touchend', endDrag);

        setInterval(() => { if (targets.length < 4) targets.push(new HalloweenMonster()); }, 1500);

        // GÖRSEL TABANLI YENİ YAY ÇİZİMİ
        function drawLauncher() {
            ctx.save();

            let angle = 0;
            if (launcher.isDragging) {
                // Matematiksel yönü tersine çevirerek okun fırlatılacağı gerçek hedef açısını hesaplıyoruz
                angle = Math.atan2(launcher.dragY - launcher.y, launcher.dragX - launcher.x) - Math.PI / 2;
            }

            ctx.translate(Math.floor(launcher.x), Math.floor(launcher.y));
            ctx.rotate(angle);

            // 1. Gerilen İp (Görselin arkasında pürüzsüzce esnemesi için önce çiziliyor)
            ctx.strokeStyle = launcher.isDragging ? 'rgba(255, 51, 0, 0.8)' : 'rgba(73, 227, 27, 0.6)';
            ctx.lineWidth = 2.5;
            ctx.beginPath();

            if (launcher.isDragging) {
                // İpin geriye doğru (çektiğimiz noktaya) esnemesini sağlıyoruz
                let dist = Math.hypot(launcher.dragX - launcher.x, launcher.dragY - launcher.y);
                ctx.moveTo(-launcher.width / 2.3, 0);
                ctx.lineTo(0, -dist); // Yönü yukarı/aşağı kalibre etmek için eksi ekledik
                ctx.moveTo(launcher.width / 2.3, 0);
                ctx.lineTo(0, -dist);
            } else {
                ctx.moveTo(-launcher.width / 2.3, 0);
                ctx.lineTo(launcher.width / 2.3, 0);
            }
            ctx.stroke();

            // 2. Premium Gotik Yay Görseli (MSAA ve Netlik Modunda)
            if (launcherImage.complete) {
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';

                const aspectRatio = launcherImage.naturalWidth / launcherImage.naturalHeight;
                launcher.width = launcher.height * aspectRatio;

                // Görselin tam merkezden kusursuz dönmesi için koordinat hizalaması
                ctx.drawImage(launcherImage, -launcher.width / 2, -launcher.height / 2, launcher.width, launcher.height);
            } else {
                // Görsel yüklenene kadar yedek geometrik yay halkası
                ctx.strokeStyle = '#2b1d11'; ctx.lineWidth = 8;
                ctx.beginPath(); ctx.arc(0, 0, launcher.radius, Math.PI, 0); ctx.stroke();
            }

            ctx.restore();
        }

        // Ana Oyun Döngüsü
        function loop() {
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.clearRect(0, 0, width, height);

            if (bgImage.complete) ctx.drawImage(bgImage, 0, 0, width, height);
            else { ctx.fillStyle = "#0d021a"; ctx.fillRect(0, 0, width, height); }

            drawLauncher();

            // Oklar
            for (let i = arrows.length - 1; i >= 0; i--) {
                let arrow = arrows[i];
                arrow.update();
                arrow.draw();
                if (arrow.x < -100 || arrow.x > width + 100 || arrow.y > height + 100) {
                    arrows.splice(i, 1);
                    continue;
                }
                for (let j = targets.length - 1; j >= 0; j--) {
                    let target = targets[j];
                    let dist = Math.hypot(arrow.x - target.x, arrow.y - target.y);
                    if (dist < target.radius) {
                        score += (target.imgIndex + 1) * 10;
                        scoreEl.innerText = score;
                        targets.splice(j, 1);
                        arrows.splice(i, 1);
                        break;
                    }
                }
            }

            // Canavarlar
            for (let i = targets.length - 1; i >= 0; i--) {
                let target = targets[i];
                target.update();
                target.draw();
                if ((target.speed > 0 && target.x > width + 200) || (target.speed < 0 && target.x < -200)) {
                    targets.splice(i, 1);
                }
            }

            requestAnimationFrame(loop);
        }

        resize();
        loop();
    </script>
</body>

</html>
