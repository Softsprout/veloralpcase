<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Halloween Archery - Bigger Hitbox Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0c10;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff5500;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 8px #000, 0 0 10px #ff5500;
            pointer-events: none;
            z-index: 10;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <div id="ui">
        SKOR: <span id="score">0</span><br>
        EN YÜKSEK: <span id="highScore">0</span><br>
        YAY HAKKI: <span id="lives">3</span>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const livesEl = document.getElementById('lives');

        let score = 0;
        let highScore = localStorage.getItem('halloween_highscore') ? parseInt(localStorage.getItem('halloween_highscore')) : 0;
        let lives = 3;
        let isGameOver = false;
        let width, height;

        highScoreEl.innerText = highScore;

        // Ok ve Yay Fizik Sabitleri
        const GLOBAL_GRAVITY = 0.32;
        const GLOBAL_POWER = 0.16;

        // --- HARİCİ LİNKSİZ DONANIMSAL SES MOTORU ---
        let audioCtx = null;

        function initAudioEngine() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playBowShootSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.15);
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playHitSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.12);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        }

        function playComboSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(850, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.15);
            gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function resetGame() {
            score = 0;
            lives = 3;
            isGameOver = false;
            arrows = [];
            targets = [];
            combos = [];
            scoreEl.innerText = score;
            livesEl.innerText = lives;
        }

        // Arka plan resmi
        const bgImage = new Image();
        bgImage.src = "https://static.vecteezy.com/system/resources/thumbnails/029/731/971/small_2x/halloween-pumpkins-against-the-backdrop-of-a-scary-terrifying-house-and-forest-on-a-dark-night-halloween-background-photo.jpg";

        // Canavar Görselleri
        const monsterImages = [new Image(), new Image(), new Image()];
        monsterImages[0].src = "https://raw.githubusercontent.com/Softsprout/veloralpcase/refs/heads/main/monster1.png";
        monsterImages[1].src = "https://raw.githubusercontent.com/Softsprout/veloralpcase/refs/heads/main/monster2.png";
        monsterImages[2].src = "https://raw.githubusercontent.com/Softsprout/veloralpcase/refs/heads/main/monster3.png";

        // Yay ve Ok Görselleri
        const launcherImage = new Image();
        launcherImage.src = "https://raw.githubusercontent.com/Softsprout/veloralpcase/refs/heads/main/launcher.png";

        const arrowImage = new Image();
        arrowImage.src = "https://raw.githubusercontent.com/Softsprout/veloralpcase/refs/heads/main/arrow.png";

        // Fırlatıcı Ayarları
        const launcher = {
            x: 0,
            y: 0,
            radius: 40,
            isDragging: false,
            dragStartX: 0,
            dragStartY: 0,
            dragX: 0,
            dragY: 0,
            maxDrag: 130,
            width: 120,
            height: 90
        };

        let arrows = [];
        let targets = [];
        let combos = [];

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;

            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';

            ctx.scale(dpr, dpr);

            launcher.x = width / 2;
            launcher.y = height - 70;
        }

        // Animated Combo Text Sınıfı
        class AnimatedComboText {
            constructor(x, y, multiplier) {
                this.x = x;
                this.y = y;
                this.text = `COMBO ${multiplier}X`;
                this.alpha = 1.0;
                this.scale = 14;
                this.maxScale = 32;
                this.life = 1.0;
            }
            update() {
                this.y -= 0.8;
                if (this.scale < this.maxScale) {
                    this.scale += 2.5;
                }
                this.life -= 0.02;
                if (this.life <= 0.5) {
                    this.alpha = this.life * 2;
                }
            }
            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#ff5500';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = '#ff5500';
                ctx.shadowBlur = 12;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                ctx.font = `bold ${Math.floor(this.scale)}px "Courier New", Courier, monospace`;
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        // Canavar Sınıfı
        class HalloweenMonster {
            constructor() {
                this.imgIndex = Math.floor(Math.random() * monsterImages.length);
                this.image = monsterImages[this.imgIndex];
                this.x = Math.random() > 0.5 ? -200 : width + 200;
                this.y = Math.random() * (height * 0.45) + 60;
                this.speedX = (Math.random() * 1.8 + 1.5) * (this.x < 0 ? 1 : -1);
                this.speedY = 0;
                this.height = 65;
                this.width = 110;

                // --- HITBOX BÜYÜTÜLDÜ ---
                // Eskiden %45 olan çarpışma alanı %70'e çıkarılarak canavarların vurulması belirgin şekilde kolaylaştırıldı.
                this.radius = this.height * 0.70;

                this.isDead = false;
                this.rotation = 0;
                this.rotationSpeed = 0;
                this.comboChain = 1;
            }

            hit(impactVx) {
                this.isDead = true;
                this.speedX = impactVx * 0.6;
                this.speedY = -3;
                this.rotationSpeed = (impactVx > 0 ? 0.15 : -0.15);
            }

            update() {
                if (!this.isDead) {
                    this.x += this.speedX;
                    this.y += Math.sin(this.x * 0.02) * 0.6;
                } else {
                    this.speedY += 0.25;
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.rotation += this.rotationSpeed;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(Math.floor(this.x), Math.floor(this.y));
                ctx.rotate(this.rotation);

                if (!this.isDead && this.speedX > 0) {
                    ctx.scale(-1, 1);
                }

                if (this.image.complete) {
                    const aspectRatio = this.image.naturalWidth / this.image.naturalHeight;
                    this.width = this.height * aspectRatio;
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(this.image, -this.width / 2, -this.height / 2, this.width, this.height);
                }
                ctx.restore();
            }
        }

        // Ok Sınıfı
        class CurseArrow {
            constructor(x, y, vx, vy) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.gravity = 0.32; this.angle = 0;
                this.height = 20;
                this.width = 80;
                this.hasHit = false;
            }
            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.angle = Math.atan2(this.vy, this.vx);
            }
            draw() {
                ctx.save();
                ctx.translate(Math.floor(this.x), Math.floor(this.y));
                ctx.rotate(this.angle + Math.PI);

                if (arrowImage.complete) {
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    const aspectRatio = arrowImage.naturalWidth / arrowImage.naturalHeight;
                    this.width = this.height * aspectRatio;
                    ctx.drawImage(arrowImage, -this.width / 2, -this.height / 2, this.width, this.height);
                } else {
                    ctx.strokeStyle = '#49e31b'; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.moveTo(-30, 0); ctx.lineTo(30, 0); ctx.stroke();
                }
                ctx.restore();
            }
        }

        // Girdi Kontrolleri
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }
        function startDrag(e) {
            initAudioEngine();
            if (isGameOver) { resetGame(); return; }

            const pos = getPos(e);
            launcher.isDragging = true;
            launcher.dragStartX = pos.x;
            launcher.dragStartY = pos.y;
            launcher.dragX = pos.x;
            launcher.dragY = pos.y;
        }
        function doDrag(e) {
            if (!launcher.isDragging || isGameOver) return;
            const pos = getPos(e);

            const dx = pos.x - launcher.dragStartX;
            const dy = pos.y - launcher.dragStartY;
            const dist = Math.hypot(dx, dy);

            if (dist > launcher.maxDrag) {
                const angle = Math.atan2(dy, dx);
                launcher.dragX = launcher.dragStartX + Math.cos(angle) * launcher.maxDrag;
                launcher.dragY = launcher.dragStartY + Math.sin(angle) * launcher.maxDrag;
            } else {
                launcher.dragX = pos.x;
                launcher.dragY = pos.y;
            }
        }
        function endDrag(e) {
            if (!launcher.isDragging || isGameOver) return;
            launcher.isDragging = false;

            const dx = launcher.dragStartX - launcher.dragX;
            const dy = launcher.dragStartY - launcher.dragY;

            if (Math.hypot(dx, dy) > 10) {
                playBowShootSound();
                arrows.push(new CurseArrow(launcher.x, launcher.y - 10, dx * GLOBAL_POWER, dy * GLOBAL_POWER));
            }
        }

        window.addEventListener('resize', resize);
        canvas.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', doDrag);
        window.addEventListener('mouseup', endDrag);
        canvas.addEventListener('touchstart', startDrag, { passive: true });
        canvas.addEventListener('touchmove', doDrag, { passive: true });
        window.addEventListener('touchend', endDrag);

        setInterval(() => {
            if (targets.length < 4 && !isGameOver) targets.push(new HalloweenMonster());
        }, 1500);

        function drawTrajectoryIndicator(vx, vy) {
            ctx.save();
            let trajX = launcher.x;
            let trajY = launcher.y - 10;
            let currentVx = vx;
            let currentVy = vy;

            ctx.fillStyle = '#49e31b';
            ctx.shadowColor = '#49e31b';
            ctx.shadowBlur = 10;

            for (let i = 0; i < 4; i++) {
                for (let step = 0; step < 7; step++) {
                    currentVy += GLOBAL_GRAVITY;
                    trajX += currentVx;
                    trajY += currentVy;
                }
                ctx.beginPath();
                ctx.arc(Math.floor(trajX), Math.floor(trajY), 5 - i * 0.8, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function drawLauncher() {
            ctx.save();
            let angle = 0;
            let launchVx = 0, launchVy = 0;

            if (launcher.isDragging) {
                const dragDx = launcher.dragStartX - launcher.dragX;
                const dragDy = launcher.dragStartY - launcher.dragY;

                angle = Math.atan2(-dragDy, -dragDx) - Math.PI / 2;
                launchVx = dragDx * GLOBAL_POWER;
                launchVy = dragDy * GLOBAL_POWER;

                if (Math.hypot(dragDx, dragDy) > 10) {
                    drawTrajectoryIndicator(launchVx, launchVy);
                }
            }

            ctx.translate(Math.floor(launcher.x), Math.floor(launcher.y));
            ctx.rotate(angle);

            if (launcherImage.complete) {
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                const aspectRatio = launcherImage.naturalWidth / launcherImage.naturalHeight;
                launcher.width = launcher.height * aspectRatio * 1.5;
                ctx.drawImage(launcherImage, -launcher.width / 2, -launcher.height / 2, launcher.width, launcher.height);
            } else {
                ctx.strokeStyle = '#2b1d11'; ctx.lineWidth = 8;
                ctx.beginPath(); ctx.arc(0, 0, launcher.radius * 1.5, Math.PI, 0); ctx.stroke();
            }

            if (launcher.isDragging && arrowImage.complete) {
                const stretchDist = Math.hypot(launcher.dragStartX - launcher.dragX, launcher.dragStartY - launcher.dragY);
                ctx.save();
                ctx.rotate(Math.PI / 2);
                const arrowAspect = arrowImage.naturalWidth / arrowImage.naturalHeight;
                let arrowH = 20;
                let arrowW = arrowH * arrowAspect;
                ctx.drawImage(arrowImage, -arrowW / 2 + (stretchDist - 20), -arrowH / 2, arrowW, arrowH);
                ctx.restore();
            }
            ctx.restore();
        }

        function drawGameOverScreen() {
            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#ff5500';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#ff5500';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            ctx.font = 'bold 48px "Courier New", Courier, monospace';
            ctx.fillText('GAME OVER', width / 2, height / 2 - 30);
            ctx.font = 'bold 20px "Courier New", Courier, monospace';
            ctx.shadowBlur = 8;
            ctx.fillText('YENİDEN BAŞLAMAK İÇİN DOKUN', width / 2, height / 2 + 40);
            ctx.restore();
        }

        function loop() {
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.clearRect(0, 0, width, height);

            if (bgImage.complete) ctx.drawImage(bgImage, 0, 0, width, height);
            else { ctx.fillStyle = "#0d021a"; ctx.fillRect(0, 0, width, height); }

            if (!isGameOver) drawLauncher();

            // Oklar Kontrolü
            for (let i = arrows.length - 1; i >= 0; i--) {
                let arrow = arrows[i];
                if (!isGameOver) arrow.update();
                arrow.draw();

                if (arrow.x < -100 || arrow.x > width + 100 || arrow.y > height + 100) {
                    if (!arrow.hasHit) {
                        lives--;
                        livesEl.innerText = lives;
                        if (lives <= 0) isGameOver = true;
                    }
                    arrows.splice(i, 1);
                    continue;
                }

                for (let j = targets.length - 1; j >= 0; j--) {
                    let target = targets[j];
                    if (target.isDead) continue;

                    let dist = Math.hypot(arrow.x - target.x, arrow.y - target.y);
                    if (dist < target.radius) {
                        score += (target.imgIndex + 1) * 10;
                        scoreEl.innerText = score;

                        if (score > highScore) {
                            highScore = score;
                            highScoreEl.innerText = highScore;
                            localStorage.setItem('halloween_highscore', highScore);
                        }

                        arrow.hasHit = true;
                        playHitSound();
                        target.hit(arrow.vx);
                        arrows.splice(i, 1);
                        break;
                    }
                }
            }

            // Canavarlar Kontrolü & Kombo Yönetimi
            for (let i = targets.length - 1; i >= 0; i--) {
                let target = targets[i];
                if (!isGameOver) target.update();
                target.draw();

                if (target.isDead) {
                    for (let j = targets.length - 1; j >= 0; j--) {
                        let other = targets[j];
                        if (i !== j && !other.isDead) {
                            let hitDist = Math.hypot(target.x - other.x, target.y - other.y);
                            if (hitDist < (target.radius + other.radius)) {

                                other.comboChain = target.comboChain + 1;
                                other.hit(target.speedX * 1.2);

                                lives++;
                                livesEl.innerText = lives;

                                score += (other.imgIndex + 1) * 20 * other.comboChain;
                                scoreEl.innerText = score;

                                playComboSound();

                                let midX = (target.x + other.x) / 2;
                                let midY = (target.y + other.y) / 2;
                                combos.push(new AnimatedComboText(midX, midY, other.comboChain));
                            }
                        }
                    }
                }

                if (target.y > height + 100 || target.x < -250 || target.x > width + 250) {
                    targets.splice(i, 1);
                }
            }

            // Kombo Animasyonları Çizimi
            for (let i = combos.length - 1; i >= 0; i--) {
                let comboText = combos[i];
                comboText.update();
                comboText.draw();
                if (comboText.life <= 0) {
                    combos.splice(i, 1);
                }
            }

            if (isGameOver) drawGameOverScreen();

            requestAnimationFrame(loop);
        }

        resize();
        loop();
    </script>
</body>

</html>
