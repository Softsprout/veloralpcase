<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Halloween Archery - High Definition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0c10;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            /* GPU ivmelenmesini CSS tarafında da zorunlu kılıyoruz */
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff5500;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 8px #000, 0 0 10px #ff5500;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>

<body>

    <div id="ui">SKOR: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        let score = 0;
        let width, height;

        // Arka plan resmi yükleme
        const bgImage = new Image();
        bgImage.src = "https://static.vecteezy.com/system/resources/thumbnails/029/731/971/small_2x/halloween-pumpkins-against-the-backdrop-of-a-scary-terrifying-house-and-forest-on-a-dark-night-halloween-background-photo.jpg";

        // GitHub Canavar Görselleri
        const monsterImages = [
            new Image(),
            new Image(),
            new Image()
        ];
        monsterImages[0].src = "https://raw.githubusercontent.com/Softsprout/veloralpcase/refs/heads/main/monster1.png";
        monsterImages[1].src = "https://raw.githubusercontent.com/Softsprout/veloralpcase/refs/heads/main/monster2.png";
        monsterImages[2].src = "https://raw.githubusercontent.com/Softsprout/veloralpcase/refs/heads/main/monster3.png";

        // Yay Fırlatıcı Ayarları
        const launcher = {
            x: 0,
            y: 0,
            radius: 50,
            isDragging: false,
            dragX: 0,
            dragY: 0,
            maxDrag: 150
        };

        let arrows = [];
        let targets = [];

        // HD Ekranlar ve Mobil Cihazlar için Piksel Yoğunluğu (Anti-Aliasing Çözümü)
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;

            // Canvas'ın fiziksel piksel boyutunu ekran çözünürlüğüne göre katlıyoruz
            canvas.width = width * dpr;
            canvas.height = height * dpr;

            // CSS boyutunu normal bırakıyoruz
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';

            // Çizim context'ini dpr oranında ölçekleyerek jilet gibi netlik elde ediyoruz
            ctx.scale(dpr, dpr);

            launcher.x = width / 2;
            launcher.y = height - 60;
        }

        // Canavar Sınıfı
        class HalloweenMonster {
            constructor() {
                this.imgIndex = Math.floor(Math.random() * monsterImages.length);
                this.image = monsterImages[this.imgIndex];

                this.x = Math.random() > 0.5 ? -200 : width + 200;
                this.y = Math.random() * (height * 0.45) + 60;
                this.speed = (Math.random() * 1.8 + 1.5) * (this.x < 0 ? 1 : -1);

                // --- BOYUT 3/4 ORANINA ÇEKİLDİ ---
                this.height = 65;
                this.width = 110;
                this.radius = this.height * 0.45;
            }

            update() {
                this.x += this.speed;
                this.y += Math.sin(this.x * 0.02) * 0.6;
            }

            draw() {
                ctx.save();

                // Titremeyi önlemek için koordinatları Math.floor ile tam sayıya yuvarlıyoruz
                ctx.translate(Math.floor(this.x), Math.floor(this.y));

                if (this.speed > 0) {
                    ctx.scale(-1, 1);
                }

                if (this.image.complete) {
                    const aspectRatio = this.image.naturalWidth / this.image.naturalHeight;
                    this.width = this.height * aspectRatio;

                    // Kenar yumuşatmayı en yüksek kaliteye zorla
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';

                    ctx.drawImage(this.image, -this.width / 2, -this.height / 2, this.width, this.height);
                }

                ctx.restore();
            }
        }

        // Lanetli Ok Sınıfı
        class CurseArrow {
            constructor(x, y, vx, vy) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.gravity = 0.16; this.angle = 0;
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.angle = Math.atan2(this.vy, this.vx);
            }

            draw() {
                ctx.save();
                ctx.translate(Math.floor(this.x), Math.floor(this.y));
                ctx.rotate(this.angle);

                ctx.strokeStyle = '#3a2d54';
                ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(-35, 0); ctx.lineTo(0, 0); ctx.stroke();

                ctx.fillStyle = '#8a0303';
                ctx.beginPath(); ctx.moveTo(-35, 0); ctx.lineTo(-45, -8); ctx.lineTo(-40, 0); ctx.lineTo(-45, 8); ctx.closePath(); ctx.fill();

                ctx.fillStyle = '#49e31b';
                ctx.shadowColor = '#49e31b';
                ctx.shadowBlur = 12;
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-12, -7); ctx.lineTo(10, 0); ctx.lineTo(-12, 7); ctx.closePath(); ctx.fill();

                ctx.restore();
                ctx.shadowBlur = 0;
            }
        }

        // Girdi Kontrolleri
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrag(e) {
            const pos = getPos(e);
            const dist = Math.hypot(pos.x - launcher.x, pos.y - launcher.y);
            if (dist < launcher.radius + 50) {
                launcher.isDragging = true;
                launcher.dragX = pos.x;
                launcher.dragY = pos.y;
            }
        }

        function doDrag(e) {
            if (!launcher.isDragging) return;
            const pos = getPos(e);
            const dx = pos.x - launcher.x;
            const dy = pos.y - launcher.y;
            const dist = Math.hypot(dx, dy);

            if (dist > launcher.maxDrag) {
                launcher.dragX = launcher.x + (dx / dist) * launcher.maxDrag;
                launcher.dragY = launcher.y + (dy / dist) * launcher.maxDrag;
            } else {
                launcher.dragX = pos.x;
                launcher.dragY = pos.y;
            }
        }

        function endDrag(e) {
            if (!launcher.isDragging) return;
            launcher.isDragging = false;
            const dx = launcher.x - launcher.dragX;
            const dy = launcher.y - launcher.dragY;
            const power = 0.16;
            arrows.push(new CurseArrow(launcher.x, launcher.y - 20, dx * power, dy * power));
        }

        window.addEventListener('resize', resize);
        canvas.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', doDrag);
        window.addEventListener('mouseup', endDrag);
        canvas.addEventListener('touchstart', startDrag, { passive: true });
        canvas.addEventListener('touchmove', doDrag, { passive: true });
        window.addEventListener('touchend', endDrag);

        // Canavar Üretim Döngüsü
        setInterval(() => {
            if (targets.length < 4) {
                targets.push(new HalloweenMonster());
            }
        }, 1500);

        // Yay Çizimi
        function drawLauncher() {
            ctx.save();
            ctx.translate(Math.floor(launcher.x), Math.floor(launcher.y));

            ctx.strokeStyle = launcher.isDragging ? '#ff3300' : '#44e31b';
            ctx.lineWidth = 2;
            ctx.beginPath();
            if (launcher.isDragging) {
                let localDragX = launcher.dragX - launcher.x;
                let localDragY = launcher.dragY - launcher.y;
                ctx.moveTo(-50, -10); ctx.lineTo(localDragX, localDragY); ctx.lineTo(50, -10);
            } else {
                ctx.moveTo(-50, -10); ctx.lineTo(50, -10);
            }
            ctx.stroke();

            ctx.strokeStyle = '#2b1d11'; ctx.lineWidth = 10; ctx.lineCap = 'round'; ctx.shadowColor = '#000'; ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.arc(0, 15, 52, Math.PI, 0, false); ctx.stroke();

            ctx.fillStyle = '#ff7700'; ctx.beginPath(); ctx.arc(0, 15, 14, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = '#d1ccb8'; ctx.strokeStyle = '#423d30'; ctx.lineWidth = 1.5; ctx.fillRect(-8, 25, 16, 50);
            for (let i = -10; i <= 10; i += 6) {
                ctx.beginPath(); ctx.arc(i, 20, 4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            }

            ctx.restore();
            ctx.shadowBlur = 0;
        }

        // Ana Oyun Döngüsü
        function loop() {
            // Ekranda pürüzsüzlük ayarlarını koru
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            ctx.clearRect(0, 0, width, height);

            // Arka Plan
            if (bgImage.complete) {
                ctx.drawImage(bgImage, 0, 0, width, height);
            } else {
                ctx.fillStyle = "#0d021a"; ctx.fillRect(0, 0, width, height);
            }

            drawLauncher();

            // Oklar
            for (let i = arrows.length - 1; i >= 0; i--) {
                let arrow = arrows[i];
                arrow.update();
                arrow.draw();

                if (arrow.x < -50 || arrow.x > width + 50 || arrow.y > height + 50) {
                    arrows.splice(i, 1);
                    continue;
                }

                for (let j = targets.length - 1; j >= 0; j--) {
                    let target = targets[j];
                    let dist = Math.hypot(arrow.x - target.x, arrow.y - target.y);
                    if (dist < target.radius) {
                        score += (target.imgIndex + 1) * 10;
                        scoreEl.innerText = score;
                        targets.splice(j, 1);
                        arrows.splice(i, 1);
                        break;
                    }
                }
            }

            // Canavarlar
            for (let i = targets.length - 1; i >= 0; i--) {
                let target = targets[i];
                target.update();
                target.draw();

                if ((target.speed > 0 && target.x > width + 150) || (target.speed < 0 && target.x < -150)) {
                    targets.splice(i, 1);
                }
            }

            requestAnimationFrame(loop);
        }

        // İlk Çalıştırma
        resize();
        loop();
    </script>
</body>

</html>
