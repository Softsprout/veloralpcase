<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Halloween Archery - Nightmare Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0c10;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff5500;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 8px #000, 0 0 10px #ff5500;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>

<body>

    <div id="ui">SKOR: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        let score = 0;
        let width, height;

        // Arka plan resmi yükleme
        const bgImage = new Image();
        bgImage.src = "https://static.vecteezy.com/system/resources/thumbnails/029/731/971/small_2x/halloween-pumpkins-against-the-backdrop-of-a-scary-terrifying-house-and-forest-on-a-dark-night-halloween-background-photo.jpg";

        // GitHub Canavar Görselleri
        const monsterImages = [
            new Image(),
            new Image(),
            new Image()
        ];
        monsterImages[0].src = "https://raw.githubusercontent.com/Softsprout/veloralpcase/refs/heads/main/monster1.png";
        monsterImages[1].src = "https://raw.githubusercontent.com/Softsprout/veloralpcase/refs/heads/main/monster2.png";
        monsterImages[2].src = "https://raw.githubusercontent.com/Softsprout/veloralpcase/refs/heads/main/monster3.png";

        // Yay Fırlatıcı Ayarları (İskelet Kol / Gotik Tasarım)
        const launcher = {
            x: 0,
            y: 0,
            radius: 50,
            isDragging: false,
            dragX: 0,
            dragY: 0,
            maxDrag: 150
        };

        let arrows = [];
        let targets = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            launcher.x = width / 2;
            launcher.y = height - 60;
        }

        // GitHub Görsellerini Kullanan Canavar Sınıfı
        class HalloweenMonster {
            constructor() {
                // Yüklediğin 3 görselden birini rastgele seçiyoruz
                this.imgIndex = Math.floor(Math.random() * monsterImages.length);
                this.image = monsterImages[this.imgIndex];

                // Giriş yönü (Rastgele sağdan veya soldan)
                this.x = Math.random() > 0.5 ? -150 : width + 150;
                this.y = Math.random() * (height * 0.45) + 60; // Ekranın üst yarısında uçarlar
                this.speed = (Math.random() * 1.8 + 1.5) * (this.x < 0 ? 1 : -1);

                // Canavarların heybetli durması için boyut ayarı
                this.size = 110;
                this.radius = this.size * 0.35; // Vurulma hassasiyeti yarıçapı
            }

            update() {
                this.x += this.speed;
                // Havada mistik bir süzülme dalgası efekti
                this.y += Math.sin(this.x * 0.02) * 0.6;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Hareket yönüne göre görseli yatayda aynalama
                if (this.speed < 0) ctx.scale(-1, 1);

                // Görsel yüklendiyse canvas üzerine merkezleyerek çiz
                if (this.image.complete) {
                    ctx.drawImage(this.image, -this.size / 2, -this.size / 2, this.size, this.size);
                }

                ctx.restore();
            }
        }

        // Lanetli Ok Sınıfı
        class CurseArrow {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.gravity = 0.16; // Yerçekimi kuvveti
                this.angle = 0;
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.angle = Math.atan2(this.vy, this.vx);
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Ok Gövdesi (Koyu Antik Cadı Odunu)
                ctx.strokeStyle = '#3a2d54';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(-35, 0);
                ctx.lineTo(0, 0);
                ctx.stroke();

                // Ok Arkası (Yarasa Kanadı Formu)
                ctx.fillStyle = '#8a0303';
                ctx.beginPath();
                ctx.moveTo(-35, 0);
                ctx.lineTo(-45, -8);
                ctx.lineTo(-40, 0);
                ctx.lineTo(-45, 8);
                ctx.closePath();
                ctx.fill();

                // Parlayan Ok Ucu (Plazma Yeşili)
                ctx.fillStyle = '#49e31b';
                ctx.shadowColor = '#49e31b';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(-12, -7);
                ctx.lineTo(10, 0);
                ctx.lineTo(-12, 7);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
                ctx.shadowBlur = 0;
            }
        }

        // Giriş Kontrol Koordinatörleri (PC & Mobil Ortak)
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrag(e) {
            const pos = getPos(e);
            const dist = Math.hypot(pos.x - launcher.x, pos.y - launcher.y);
            if (dist < launcher.radius + 50) {
                launcher.isDragging = true;
                launcher.dragX = pos.x;
                launcher.dragY = pos.y;
            }
        }

        function doDrag(e) {
            if (!launcher.isDragging) return;
            const pos = getPos(e);
            const dx = pos.x - launcher.x;
            const dy = pos.y - launcher.y;
            const dist = Math.hypot(dx, dy);

            if (dist > launcher.maxDrag) {
                launcher.dragX = launcher.x + (dx / dist) * launcher.maxDrag;
                launcher.dragY = launcher.y + (dy / dist) * launcher.maxDrag;
            } else {
                launcher.dragX = pos.x;
                launcher.dragY = pos.y;
            }
        }

        function endDrag(e) {
            if (!launcher.isDragging) return;
            launcher.isDragging = false;

            const dx = launcher.x - launcher.dragX;
            const dy = launcher.y - launcher.dragY;
            const power = 0.16; // Atış hızı çarpanı

            // Oku yayın hafif üst noktasından fırlatıyoruz
            arrows.push(new CurseArrow(launcher.x, launcher.y - 20, dx * power, dy * power));
        }

        // Dinleyiciler
        window.addEventListener('resize', resize);
        canvas.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', doDrag);
        window.addEventListener('mouseup', endDrag);
        canvas.addEventListener('touchstart', startDrag, { passive: true });
        window.addEventListener('touchmove', doDrag, { passive: true });
        window.addEventListener('touchend', endDrag);

        // Canavar Üretim Döngüsü
        setInterval(() => {
            if (targets.length < 4) { // Ekranda aynı anda en fazla 4 canavar olabilir
                targets.push(new HalloweenMonster());
            }
        }, 1500);

        // Gotik Tasarımlı Yay ve İskelet El Çizimi
        function drawLauncher() {
            ctx.save();
            ctx.translate(launcher.x, launcher.y);

            // 1. Gerilen İp (Çekilirken kırmızılaşır, dururken yeşildir)
            ctx.strokeStyle = launcher.isDragging ? '#ff3300' : '#44e31b';
            ctx.lineWidth = 2;
            ctx.beginPath();
            if (launcher.isDragging) {
                let localDragX = launcher.dragX - launcher.x;
                let localDragY = launcher.dragY - launcher.y;
                ctx.moveTo(-50, -10);
                ctx.lineTo(localDragX, localDragY);
                ctx.lineTo(50, -10);
            } else {
                ctx.moveTo(-50, -10);
                ctx.lineTo(50, -10);
            }
            ctx.stroke();

            // 2. Gotik Ahşap Yay Gövdesi
            ctx.strokeStyle = '#2b1d11';
            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(0, 15, 52, Math.PI, 0, false);
            ctx.stroke();

            // Yayın merkezindeki uğursuz turuncu çekirdek
            ctx.fillStyle = '#ff7700';
            ctx.beginPath();
            ctx.arc(0, 15, 14, 0, Math.PI * 2);
            ctx.fill();

            // 3. Yayı Alanı Saran Kemikli İskelet Kol
            ctx.fillStyle = '#d1ccb8';
            ctx.strokeStyle = '#423d30';
            ctx.lineWidth = 1.5;
            ctx.fillRect(-8, 25, 16, 50); // Kol gövdesi
            for (let i = -10; i <= 10; i += 6) { // Parmaklar
                ctx.beginPath();
                ctx.arc(i, 20, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }

            ctx.restore();
            ctx.shadowBlur = 0;
        }

        // Ana Oyun Döngüsü (Game Loop)
        function loop() {
            ctx.clearRect(0, 0, width, height);

            // 1. Arka Planı Responsive Olarak Çiz
            if (bgImage.complete) {
                ctx.drawImage(bgImage, 0, 0, width, height);
            } else {
                ctx.fillStyle = "#0d021a";
                ctx.fillRect(0, 0, width, height);
            }

            // 2. Yayı Çiz
            drawLauncher();

            // 3. Okları Güncelle ve Çiz (Nişan hattı tamamen gizli)
            for (let i = arrows.length - 1; i >= 0; i--) {
                let arrow = arrows[i];
                arrow.update();
                arrow.draw();

                // Ekrandan uçup giden okları bellekten sil
                if (arrow.x < -50 || arrow.x > width + 50 || arrow.y > height + 50) {
                    arrows.splice(i, 1);
                    continue;
                }

                // Canavarlarla Çarpışma Testi
                for (let j = targets.length - 1; j >= 0; j--) {
                    let target = targets[j];
                    let dist = Math.hypot(arrow.x - target.x, arrow.y - target.y);

                    if (dist < target.radius) {
                        // Vurulduğunda canavarın türüne göre skor artar
                        score += (target.imgIndex + 1) * 10;
                        scoreEl.innerText = score;

                        targets.splice(j, 1);
                        arrows.splice(i, 1);
                        break;
                    }
                }
            }

            // 4. Canavarları Güncelle ve Çiz
            for (let i = targets.length - 1; i >= 0; i--) {
                let target = targets[i];
                target.update();
                target.draw();

                // Ekrandan tamamen çıkan canavarları temizle
                if ((target.speed > 0 && target.x > width + 150) || (target.speed < 0 && target.x < -150)) {
                    targets.splice(i, 1);
                }
            }

            requestAnimationFrame(loop);
        }

        // Oyunu Çalıştır
        resize();
        loop();
    </script>
</body>

</html>
